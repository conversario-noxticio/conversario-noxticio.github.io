<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversario Noxticio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon-apple.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="night-mode">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3 py-2">
        <span class="navbar-brand mb-0 h1 d-flex align-items-center">
            Conversario Noxticio
        </span>
        <a href="https://www.instagram.com/conversariopintojo/" target="_blank" class="ms-auto">
            <img src="images/instagram.png" alt="Instagram" class="instagram-icon">
        </a>
    </nav>

    <!-- Main Area -->
    <button id="draw-btn" class="btn btn-primary btn-lg my-4">Sacar carta (<span id="cards-left">0</span>/<span id="cards-total">0</span>)</button>
    <main class="container-fluid d-flex flex-column align-items-center main-area">
        <div id="card-area" class="mt-4"></div>
        <div id="options-area"></div>
        <div id="info-area"></div>
        <div id="random-area"></div>
        <div id="final-options-area"></div>
    </main>

    <!-- Hand Icon and Counter -->
    <div id="hand-container" class="hand-container">
        <img src="images/hand.png" alt="Tu mano" id="hand-icon" class="hand-icon">
        <span id="hand-count" class="hand-count">0</span>
    </div>

    <!-- Hand Modal -->
    <div id="hand-modal" class="modal-overlay" tabindex="-1">
        <div class="modal-content hand-modal-content">
            <button class="close-modal" id="close-hand-modal">&times;</button>
            <h5 class="mb-4">Tu mano</h5>
            <div id="hand-cards" class="hand-cards-scroll d-flex flex-row"></div>
            <div id="hand-empty" class="text-center mt-4 mb-5 d-none">Aún no tienes ninguna carta</div>
        </div>
    </div>

    <!-- Card Detail Modal -->
    <div id="card-detail-modal" class="modal-overlay" tabindex="-1">
        <div class="modal-content card-detail-modal-content">
            <button class="close-modal" id="close-card-detail-modal">&times;</button>
            <div id="card-detail-area"></div>
            <div id="card-detail-option" class="mt-4"></div>
            <div id="card-detail-info" class="mt-3"></div>
        </div>
    </div>

    <!-- Bootstrap JS (for modal focus trap) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery (for ease of some DOM ops) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Tu options.js debe ir aquí -->
    <script src="options.js"></script>
    <!-- Juego principal -->
    <script src="script.js"></script>
</body>
</html>
